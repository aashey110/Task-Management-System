<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            color: #333;
        }
        .container {
            margin-top: 50px;
            max-width: 600px;
        }
        .welcome-card {
            background-color: #007bff;
            color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .welcome-card h1 {
            margin-bottom: 10px;
        }
        .welcome-card h1:first-child {
            font-size: 28px;
            font-weight: bold;
        }
        .welcome-card h1:last-child {
            font-size: 20px;
        }
        .nav-links {
            margin-top: 20px;
            display: flex;
            justify-content: space-around;
        }
        .nav-links a {
            text-decoration: none;
            font-weight: bold;
            color: white;
            background-color: #0056b3;
            padding: 10px 20px;
            border-radius: 6px;
            transition: background-color 0.3s ease;
        }
        .nav-links a:hover {
            background-color: #003d80;
        }
        .logout-link {
            margin-top: 20px;
            display: block;
            text-align: center;
            font-size: 16px;
            color: #ff4b5c;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }
        .logout-link:hover {
            color: #d62839;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="welcome-card">
        <h1>Welcome, {{ user.username }}</h1>
        <h1>Role: {{ user.role }}</h1>
    </div>

    <div class="nav-links">
        <a href="{% url 'add_task' %}">Assign Task</a>
        <a href="{% url 'show_task' %}">Show Tasks</a>
    </div>

    <a href="{% url 'user_logout' %}" class="logout-link">Logout</a>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
